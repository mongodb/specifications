description: "Connection churn is prevented by reading pending responses during connection checkout"

schemaVersion: "1.24"

runOnRequirements:
  - minServerVersion: "4.4"
    # TODO(SERVER-96344): When using failpoints, mongos returns MaxTimeMSExpired
    # after maxTimeMS, whereas mongod returns it after
    # max(blockTimeMS, maxTimeMS).  Until this ticket is resolved, these tests
    # will not pass on sharded clusters.
    topologies: ["single", "replicaset"]

createEntities:
  - client:
      id: &failPointClient failPointClient
      useMultipleMongoses: false
  - client:
      id: &client client
      uriOptions:
        maxPoolSize: 1
      useMultipleMongoses: false
      observeEvents:
        - commandFailedEvent
        - commandSucceededEvent
        - connectionCheckedOutEvent
        - connectionCheckedInEvent
        - connectionClosedEvent
        - connectionPendingResponseSucceeded
        - connectionPendingResponseStarted
        - connectionPendingResponseFailed
  - database:
      id: &database test
      client: *client
      databaseName: *database
  - collection:
      id: &collection coll
      database: *database
      collectionName: *collection

initialData:
  - collectionName: *collection
    databaseName: *database
    documents: []

tests:
  # Attempting pending response read on a non-timeout operation that can
  # immediately read from the TCP buffer should complete the pending read and
  # the connection should be checked out.
  - description: "non-timeout write op with response and no error"
    operations:
      # Run a ping command to pre-load the pool with a connection.
      - name: runCommand
        object: *database
        arguments:
          command:
            ping: 1

      # Create a failpoint to block the first operation
      - name: failPoint
        object: testRunner
        arguments:
          client: *failPointClient
          failPoint:
            configureFailPoint: failCommand
            mode: { times: 1 }
            data:
              failCommands: ["insert"]
              blockConnection: true
              blockTimeMS: 100

      # Execute operation with timeout less than block time
      - name: insertOne
        object: *collection
        arguments:
          timeoutMS: 75
          document: { _id: 3, x: 1 }
        expectError:
          isTimeoutError: true

      # Execute a subsequent operation to complete the read
      - name: findOne
        object: *collection
        arguments:
          filter: { _id: 1 }

    expectEvents:
      - client: *client
        events:
          - commandSucceededEvent:
              commandName: ping # pre-loading the connection pool.
          - commandFailedEvent:
              commandName: insert
          - commandSucceededEvent:
              commandName: find
      - client: *client
        eventType: cmap
        events:
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # ping finishes
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # insert fails
          - connectionPendingResponseStarted: {}
          - connectionPendingResponseSucceeded: {}  # find op drains conn
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # find succeeds

  # Attempting pending response read on a non-timeout operation that gets no
  # response from the server after 3s should close the connection.
  - description: "non-timeout op with no response"
    operations:
      # Run a ping command to pre-load the pool with a connection.
      - name: runCommand
        object: *database
        arguments:
          command:
            ping: 1

      # Create a failpoint to block the first operation
      - name: failPoint
        object: testRunner
        arguments:
          client: *failPointClient
          failPoint:
            configureFailPoint: failCommand
            mode: { times: 1 }
            data:
              failCommands: ["insert"]
              blockConnection: true
              blockTimeMS: 3100

      # Execute operation with timeout less than block time
      - name: insertOne
        object: *collection
        arguments:
          timeoutMS: 50
          document: { _id: 3, x: 1 }
        expectError:
          isTimeoutError: true

      # Execute a subsequent operation to complete the read
      - name: findOne
        object: *collection
        arguments:
          filter: { _id: 1 }
        expectError:
          isTimeoutError: true

    expectEvents:
      - client: *client
        events:
          - commandSucceededEvent:
              commandName: ping # pre-loading the connection pool.
          - commandFailedEvent:
              commandName: insert
          # No second failed event since we timed out attempting to check out
          # the connection for the second operation
      - client: *client
        eventType: cmap
        events:

          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # ping finishes
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # insert fails
          - connectionPendingResponseStarted: {}
          - connectionPendingResponseFailed:
              reason: timeout
          - connectionClosedEvent:
              reason: error

  # Attempting pending response read on a realistic timeout operation that can
  # immediately read from the TCP buffer should complete the pending read and
  # the connection should be checked out.
  - description: "timeout write op with response and no error"
    operations:
      # Run a ping command to pre-load the pool with a connection.
      - name: runCommand
        object: *database
        arguments:
          command:
            ping: 1

      # Create a failpoint to block the first operation
      - name: failPoint
        object: testRunner
        arguments:
          client: *failPointClient
          failPoint:
            configureFailPoint: failCommand
            mode: { times: 1 }
            data:
              failCommands: ["insert"]
              blockConnection: true
              blockTimeMS: 250

      # Execute operation with timeout less than block time
      - name: insertOne
        object: *collection
        arguments:
          timeoutMS: 75
          document: { _id: 3, x: 1 }
        expectError:
          isTimeoutError: true

      # Execute a subsequent operation to complete the read
      - name: findOne
        object: *collection
        arguments:
          timeoutMS: 200
          filter: { _id: 1 }

    expectEvents:
      - client: *client
        events:
          - commandSucceededEvent:
              commandName: ping # pre-loading the connection pool.
          - commandFailedEvent:
              commandName: insert
          - commandSucceededEvent:
              commandName: find
      - client: *client
        eventType: cmap
        events:
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # ping finishes
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # insert fails
          - connectionPendingResponseStarted: {}
          - connectionPendingResponseSucceeded: {}
          - connectionCheckedOutEvent: {}
          - connectionCheckedInEvent: {}        # find succeeds
