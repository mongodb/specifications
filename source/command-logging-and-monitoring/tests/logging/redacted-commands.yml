description: "redacted-commands"

schemaVersion: "1.13"

runOnRequirements:
  - minServerVersion: "5.0"
    auth: false

createEntities:
  - client:
      id: &client client
      useMultipleMongoses: false
      observeLogMessages:
        command: debug
  - client:
      id: &failPointClient failPointClient
      useMultipleMongoses: false
  - database:
      id: &database database
      client: *client
      databaseName: &databaseName logging-redaction-tests

tests:
  - description: "authenticate command and resulting server-generated error are redacted"
    operations:
      - name: runCommand
        object: *database
        arguments:
          commandName: authenticate
          command:
            authenticate: 1
            mechanism: "MONGODB-X509"
            user: "CN=myName,OU=myOrgUnit,O=myOrg,L=myLocality,ST=myState,C=myCountry"
            db: "$external"
        # An authentication error is expected, but we want to check that the
        # CommandStartedEvent is redacted
        expectError:
          isClientError: false
    expectLogMessages:
      - client: *client
        messages:
          - level: debug
            component: command
            data:
              message: "Command started"
              databaseName: *databaseName
              commandName: authenticate
              command:
                $$matchAsDocument: {}
          - level: debug
            component: command
            failureIsRedacted: true
            data:
              message: "Command failed"
              commandName: authenticate
              failure: { $$exists: true }

  - description: "network error in response to authenticate is not redacted"
    operations:
      - name: failPoint
        object: testRunner
        arguments:
          client: *failPointClient
          failPoint:
            configureFailPoint: failCommand
            mode: { times: 1 }
            data:
              failCommands: ["authenticate"]
              closeConnection: true
      - name: runCommand
        object: *database
        arguments:
          commandName: authenticate
          command:
            authenticate: 1
            mechanism: "MONGODB-X509"
            user: "CN=myName,OU=myOrgUnit,O=myOrg,L=myLocality,ST=myState,C=myCountry"
        expectError:
          isClientError: true
    expectLogMessages:
      - client: *client
        messages:
          - level: debug
            component: command
            data:
              message: "Command started"
              databaseName: *databaseName
              commandName: authenticate
              command:
                $$matchAsDocument: {}
          - level: debug
            component: command
            failureIsRedacted: false
            data:
              message: "Command failed"
              commandName: authenticate
              failure: { $$exists: true }

