# so ".build.10gen.cc." is equivalent to ".build.10gen.cc".
uri: "mongodb+srv://test12.test.build.10gen.cc/?srvAllowedHostsSuffix=.build.10gen.cc."
seeds:
    - localhost.build.10gen.cc:27017
options:
    srvAllowedHostsSuffix: .build.10gen.cc.
    ssl: true
ping: false
